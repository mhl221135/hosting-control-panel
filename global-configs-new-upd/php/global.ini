; ---------- PHP LIMITS ----------
memory_limit = 512M
upload_max_filesize = 128M
post_max_size = 128M
max_execution_time = 300
max_input_time = 300
file_uploads = On
max_input_vars = 8000

; ---------- OPCACHE ----------
opcache.enable = 1
opcache.memory_consumption = 512
opcache.interned_strings_buffer = 64
opcache.max_accelerated_files = 100000
; Detect WordPress, plugin, and theme updates without requiring a PHP restart.
opcache.validate_timestamps = 1
opcache.revalidate_freq = 60

; JIT usually increases memory use without improving WordPress request latency.
opcache.jit = 0
opcache.jit_buffer_size = 0

; ---------- REALPATH CACHE ----------
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; ---------- SESSION HARDENING ----------
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax

; ---------- ERRORS ----------
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL

; ---------- GLOBAL WP TWEAKS ----------
; Load shared WordPress config for all sites (HTTPS detection, Cloudflare IP, memory limits)
auto_prepend_file = /global/wp-global.php
