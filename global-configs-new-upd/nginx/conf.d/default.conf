include /etc/nginx/conf.d/sites.map;
include /etc/nginx/conf.d/cache.map;

server {
    listen 80;
    server_name _;

    root $site_root;
    index index.php index.html;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"            always;
    add_header X-Frame-Options         "SAMEORIGIN"         always;
    add_header X-XSS-Protection        "1; mode=block"      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Hide PHP version from responses
    fastcgi_hide_header X-Powered-By;

    if ($canonical_host != "") {
        return 301 $external_scheme://$canonical_host$request_uri;
    }

    # Managed sensitive-file protection.
    location ~ /\.(?!well-known(?:/|$)) {
        deny all;
    }

    location ~* /[^/]*(?:config|credential|secret|setup)[^/]*\.(?:php|txt|ini|log|bak|old)$ {
        deny all;
    }

    location ~* \.(?:sql|sqlite|env|ini|log|bak|old|orig|dist)$ {
        deny all;
    }

    # Block PHP execution inside uploads directories
    location ~* /(?:uploads|files)/.*\.php$ {
        deny all;
    }

    # Block access to sensitive WP files
    location ~* /(?:xmlrpc\.php|wp-config\.php|readme\.html|license\.txt)$ {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        # Guard against requests for PHP files that don't exist on disk
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass $php_upstream;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        set $skip_page_cache 0;
        if ($site_cache_enabled = 0) { set $skip_page_cache 1; }
        if ($skip_cache_method = 1) { set $skip_page_cache 1; }
        if ($skip_cache_query = 1) { set $skip_page_cache 1; }
        if ($skip_cache_cookie = 1) { set $skip_page_cache 1; }
        if ($skip_cache_uri = 1) { set $skip_page_cache 1; }

        fastcgi_cache WORDPRESS;
        fastcgi_cache_key "$external_scheme://$host$request_uri:v$site_cache_version";
        fastcgi_cache_methods GET HEAD;
        fastcgi_cache_lock on;
        fastcgi_cache_lock_timeout 10s;
        fastcgi_cache_bypass $skip_page_cache;
        fastcgi_no_cache $skip_page_cache;
        fastcgi_cache_valid 200 301 302 30m;
        fastcgi_cache_valid 404 1m;
        add_header X-FastCGI-Cache $upstream_cache_status always;
    }

    # The same JPG/PNG URL can resolve to different bytes based on Accept.
    # Keep it out of shared caches; browsers may still cache their own variant.
    location ~* \.(jpg|jpeg|png)$ {
        try_files $uri$webp_suffix $uri =404;
        add_header Cache-Control "private, max-age=604800, immutable" always;
        add_header Vary "Accept" always;
        access_log off;
    }

    # Explicit WebP and other static URLs have one representation and are safe
    # for Cloudflare and other shared caches.
    location ~* \.(gif|webp|svg|css|js|ico|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
