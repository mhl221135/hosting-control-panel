worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    resolver 127.0.0.11 valid=30s;

    # --- Basic performance ---
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 100;
    server_tokens off;

    # --- Client body / timeouts ---
    client_max_body_size 128m;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # --- FastCGI buffering ---
    fastcgi_buffer_size 32k;
    fastcgi_buffers 8 16k;
    fastcgi_busy_buffers_size 32k;
    fastcgi_connect_timeout 10s;
    fastcgi_send_timeout 60s;
    fastcgi_read_timeout 300s;

    # Full-page cache. Per-site enablement and versioned purging live in cache.map.
    fastcgi_cache_path /var/cache/nginx/fastcgi
        levels=1:2
        keys_zone=WORDPRESS:128m
        inactive=60m
        max_size=8g
        use_temp_path=off;

    map $request_method $skip_cache_method {
        default 1;
        GET 0;
        HEAD 0;
    }

    map $query_string $skip_cache_query {
        default 1;
        "" 0;
    }

    map $http_cookie $skip_cache_cookie {
        default 0;
        ~*wordpress_logged_in 1;
        ~*comment_author 1;
        ~*woocommerce_items_in_cart 1;
        ~*woocommerce_cart_hash 1;
        ~*wp_woocommerce_session 1;
    }

    map $request_uri $skip_cache_uri {
        default 0;
        ~*^/wp-admin 1;
        ~*^/wp-login\.php 1;
        ~*^/wp-cron\.php 1;
        ~*^/wp-json 1;
        ~*^/xmlrpc\.php 1;
        ~*^/cart 1;
        ~*^/checkout 1;
        ~*^/my-account 1;
        ~*preview=true 1;
    }

    map $http_x_forwarded_proto $external_scheme {
        default $scheme;
        https https;
        http http;
    }

    map $http_accept $webp_suffix {
        default "";
        ~*image/webp ".webp";
    }

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # --- Logs to stdout/stderr in container ---
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    include /etc/nginx/conf.d/*.conf;
}
